name: Daily LeBron Quote

on:
  schedule:
    - cron: "0 12 * * *"

jobs:
  update-quote:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: python learning_lebron.py
      - run: python update_readme.py

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md quote_of_the_day.txt
          git commit -m "Daily LeBron quote" || exit 0
          git push
